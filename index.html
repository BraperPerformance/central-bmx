<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Central do Cliente · BMX Soluções Logísticas</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
/* ============ TOKENS BMX ============ */
:root{
  --bg:#1d1f24;          /* grafite profundo */
  --panel:#26282f;       /* superfície elevada */
  --panel-2:#2d3038;     /* superfície hover */
  --line:rgba(241,194,50,.18);
  --line-soft:rgba(255,255,255,.07);
  --accent:#F1C232;      /* amarelo BMX */
  --accent-soft:rgba(241,194,50,.12);
  --ink:#F5F3EE;         /* off white */
  --muted:#9BA0AA;       /* cinza claro */
  --danger:#E4574B;
  --ok:#57C785;
  --r:13px;
  --font:'Montserrat',system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--font);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}
button{font-family:var(--font)}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation:none!important;transition:none!important}}

/* ============ ELEMENTO ASSINATURA: chevrons ‹ › do símbolo ============ */
.chev{display:inline-flex;gap:5px;align-items:center;flex:none}
.chev i{width:11px;height:11px;border:2.5px solid var(--accent);border-top:none;border-right:none;transform:rotate(45deg)}
.chev i:last-child{transform:rotate(-135deg)}
.chev.dim i{border-color:var(--muted);opacity:.55}

/* ============ LOGIN ============ */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:
    radial-gradient(900px 500px at 85% -10%, rgba(241,194,50,.07), transparent 60%),
    radial-gradient(700px 500px at -10% 110%, rgba(241,194,50,.05), transparent 60%),
    var(--bg)}
.login-card{width:100%;max-width:400px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:38px 34px;box-shadow:0 24px 60px rgba(0,0,0,.4)}
.login-card .logo{display:block;margin:0 auto 8px;width:190px}
.login-card .sub{display:flex;align-items:center;justify-content:center;gap:10px;color:var(--muted);font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;font-weight:600;margin-bottom:30px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.field input{width:100%;background:var(--bg);border:1px solid var(--line-soft);border-radius:10px;padding:12px 14px;color:var(--ink);font-size:15px;font-family:var(--font);transition:border-color .15s}
.field input:focus{outline:none;border-color:var(--accent)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--accent);color:#1d1f24;border:none;border-radius:10px;padding:13px 20px;font-size:14px;font-weight:700;letter-spacing:.03em;cursor:pointer;width:100%;transition:transform .12s, box-shadow .12s}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(241,194,50,.25)}
.login-err{display:none;margin-top:14px;background:rgba(228,87,75,.1);border:1px solid rgba(228,87,75,.35);color:#F0A29B;font-size:13px;border-radius:10px;padding:10px 13px}
.login-err.show{display:block}
.login-foot{margin-top:26px;text-align:center;color:var(--muted);font-size:12px}

/* ============ SHELL ============ */
.shell{display:none;min-height:100vh;flex-direction:column}
.topbar{position:sticky;top:0;z-index:40;background:rgba(29,31,36,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line-soft)}
.topbar-in{max-width:1180px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;gap:22px}
.topbar .brand{display:flex;align-items:center;gap:12px;flex:none}
.topbar .brand img{height:30px;display:block}
nav.menu{display:flex;gap:4px;margin-left:auto;overflow-x:auto;scrollbar-width:none}
nav.menu::-webkit-scrollbar{display:none}
nav.menu a{color:var(--muted);font-size:13px;font-weight:600;padding:8px 12px;border-radius:8px;white-space:nowrap;transition:color .12s,background .12s}
nav.menu a:hover{color:var(--ink)}
nav.menu a.active{color:var(--accent);background:var(--accent-soft)}
.userbox{display:flex;align-items:center;gap:10px;flex:none;margin-left:6px}
.userbox .uname{font-size:13px;font-weight:600}
.badge-admin{background:var(--accent);color:#1d1f24;font-size:10px;font-weight:800;letter-spacing:.08em;padding:3px 7px;border-radius:6px}
.btn-ghost{background:none;border:1px solid var(--line-soft);color:var(--muted);border-radius:8px;padding:6px 12px;font-size:12.5px;font-weight:600;cursor:pointer;transition:border-color .12s,color .12s}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}

main{flex:1;width:100%;max-width:1180px;margin:0 auto;padding:38px 24px 70px}
.eyebrow{display:flex;align-items:center;gap:10px;color:var(--accent);font-size:11.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;margin-bottom:10px}
h1.page{font-size:clamp(24px,3.4vw,32px);font-weight:800;letter-spacing:-.01em;margin-bottom:8px}
p.lead{color:var(--muted);max-width:640px;margin-bottom:34px}

/* ============ CARDS ============ */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.card{background:var(--panel);border:1px solid var(--line-soft);border-radius:var(--r);padding:22px;display:flex;flex-direction:column;gap:10px;transition:transform .14s,border-color .14s;position:relative}
a.card{color:var(--ink)}
.card:hover{transform:translateY(-2px);border-color:var(--line)}
.card .cat{display:flex;align-items:center;gap:9px;font-size:10.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
.card h3{font-size:16.5px;font-weight:700;line-height:1.35}
.card p{color:var(--muted);font-size:13.5px;flex:1}
.card .meta{display:flex;align-items:center;justify-content:space-between;color:var(--muted);font-size:12px;margin-top:4px}
.card .meta .go{color:var(--accent);font-weight:700}
.count{color:var(--accent);font-weight:800}

/* home hero */
.hero{margin-bottom:40px}
.hero h1{font-size:clamp(26px,4vw,38px);font-weight:800;letter-spacing:-.015em;line-height:1.2;margin-bottom:10px}
.hero .hi{color:var(--accent)}
.section-title{display:flex;align-items:center;gap:12px;font-size:13px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:38px 0 16px}
.section-title::after{content:"";flex:1;height:1px;background:var(--line-soft)}

/* gate comercial */
.gate{border:1.5px dashed var(--line);background:linear-gradient(140deg,rgba(241,194,50,.05),transparent 55%),var(--panel)}
.gate .soon{position:absolute;top:16px;right:16px;background:rgba(241,194,50,.15);border:1px solid var(--line);color:var(--accent);font-size:10px;font-weight:800;letter-spacing:.12em;padding:4px 9px;border-radius:20px}
.gate .avail{font-size:12px;color:var(--muted);font-style:italic}
.btn-wa{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#1d1f24;border-radius:9px;padding:10px 16px;font-size:13px;font-weight:700;margin-top:6px;align-self:flex-start;transition:transform .12s,box-shadow .12s}
.btn-wa:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(241,194,50,.25)}

/* estados vazios */
.empty{border:1px dashed var(--line-soft);border-radius:var(--r);padding:44px 24px;text-align:center;color:var(--muted)}
.empty .chev{justify-content:center;margin-bottom:12px}

/* subsection relatorios */
h2.sub{display:flex;align-items:center;gap:12px;font-size:17px;font-weight:700;margin:34px 0 14px}

/* ============ VIEWER ============ */
.viewer{position:fixed;inset:0;z-index:60;background:var(--bg);display:none;flex-direction:column}
.viewer.open{display:flex}
.vbar{flex:none;display:flex;align-items:center;gap:14px;padding:0 18px;height:56px;background:var(--panel);border-bottom:1px solid var(--line-soft)}
.vbar .vcat{display:flex;align-items:center;gap:9px;font-size:10.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);flex:none}
.vbar .vtitle{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.vbar .btn-back{flex:none;background:none;border:1px solid var(--line);color:var(--accent);border-radius:8px;padding:7px 14px;font-size:12.5px;font-weight:700;cursor:pointer;transition:background .12s}
.vbar .btn-back:hover{background:var(--accent-soft)}
.vbar .btn-new{flex:none;color:var(--muted);font-size:12px;font-weight:600;border:1px solid var(--line-soft);border-radius:8px;padding:7px 12px;transition:color .12s,border-color .12s}
.vbar .btn-new:hover{color:var(--accent);border-color:var(--line)}
.viewer iframe{flex:1;width:100%;border:none;background:#fff}

/* guia */
.guide{max-width:760px}
.guide h2{font-size:18px;font-weight:700;margin:30px 0 10px;display:flex;gap:11px;align-items:center}
.guide p, .guide li{color:var(--muted);font-size:14.5px}
.guide ul{padding-left:20px;margin:8px 0}
.guide .box-wa{margin-top:34px;background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:24px;display:flex;flex-wrap:wrap;align-items:center;gap:18px}
.guide .box-wa .t{flex:1;min-width:220px}
.guide .box-wa strong{display:block;font-size:16px;margin-bottom:4px}

/* footer */
footer{border-top:1px solid var(--line-soft);padding:26px 24px;display:flex;align-items:center;justify-content:center;gap:12px;color:var(--muted);font-size:12px}
footer img{height:22px;opacity:.9}

@media (max-width:760px){
  .topbar-in{padding:0 14px;gap:12px;height:58px}
  .topbar .brand img{height:24px}
  .userbox .uname{display:none}
  main{padding:28px 16px 60px}
  .vbar{gap:10px;padding:0 12px}
  .vbar .vcat{display:none}
}
@media (max-width:640px){
  .grid{grid-template-columns:1fr}
  .login-card{padding:30px 22px}
}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div class="login-wrap" id="login">
  <form class="login-card" id="loginForm" autocomplete="off">
    <img class="logo" src="assets/bmx-wordmark.png" alt="BMX Soluções Logísticas">
    <div class="sub"><span class="chev"><i></i><i></i></span> Central do Cliente</div>
    <div class="field">
      <label for="inName">Nome</label>
      <input id="inName" type="text" placeholder="Seu primeiro nome" required>
    </div>
    <div class="field">
      <label for="inPass">Senha</label>
      <input id="inPass" type="password" placeholder="••••••••" required>
    </div>
    <button class="btn" type="submit">Acessar a Central</button>
    <div class="login-err" id="loginErr">Nome ou senha inválidos. Confira os dados ou fale com o suporte.</div>
    <div class="login-foot">Acesso restrito · BMX Serviços &amp; Braper</div>
  </form>
</div>

<!-- ============ SHELL ============ -->
<div class="shell" id="shell">
  <header class="topbar">
    <div class="topbar-in">
      <a class="brand" href="#/home" aria-label="Início"><img src="assets/bmx-wordmark.png" alt="BMX Soluções Logísticas"></a>
      <nav class="menu" id="menu">
        <a href="#/home" data-r="home">Início</a>
        <a href="#/planejamento" data-r="planejamento">Planejamento</a>
        <a href="#/relatorios" data-r="relatorios">Relatórios</a>
        <a href="#/status" data-r="status">Status Semanal</a>
        <a href="#/links" data-r="links">Links Úteis</a>
        <a href="#/guia" data-r="guia">Guia da Central</a>
      </nav>
      <div class="userbox">
        <span class="uname" id="uName"></span>
        <span class="badge-admin" id="uAdmin" style="display:none">ADMIN</span>
        <button class="btn-ghost" id="btnOut" type="button">Sair</button>
      </div>
    </div>
  </header>

  <main id="view" tabindex="-1"></main>

  <footer>
    <img src="assets/bmx-simbolo.png" alt="">
    <span>Central do Cliente BMX · powered by Braper</span>
  </footer>
</div>

<!-- ============ VIEWER ============ -->
<div class="viewer" id="viewer" role="dialog" aria-label="Visualizador de documento">
  <div class="vbar">
    <button class="btn-back" id="vBack" type="button">← Voltar à Central</button>
    <span class="vcat" id="vCat"><span class="chev"><i></i><i></i></span> <span id="vCatTxt"></span></span>
    <span class="vtitle" id="vTitle"></span>
    <a class="btn-new" id="vNew" href="#" target="_blank" rel="noopener">Abrir em nova guia ↗</a>
  </div>
  <iframe id="vFrame" title="Documento"></iframe>
</div>

<script>
/* =====================================================================
   OBJETO DOCS — edite aqui para publicar/remover documentos.
   Categorias visíveis: 'plan' (Planejamento), 'mensal' (Relatório Mensal),
   'status' (Status Semanal). Categorias fora de CAT_LABEL ficam ocultas
   das listas mas continuam acessíveis pela rota #/doc/:id (ex.: 'perf').
   Campos: id (único, usado na URL) · cat · title · desc · file · date
   ===================================================================== */
const DOCS = [
  // ---- PLANEJAMENTO ----
  { id:'plano-marketing-2026', cat:'plan', iso:'2026-01',
    title:'Plano de Marketing 2026',
    desc:'Planejamento anual completo: resultados 2025, escopo e pilares do marketing, estratégia, plano de ação e workflow.',
    file:'docs/bmx_plan_202601_plano-marketing-2026.pdf', date:'Jan/2026' },
  { id:'estudo-plataformas', cat:'plan', iso:'2026-02',
    title:'Estudo de Plataformas — Marketing & CRM',
    desc:'Comparativo entre Ramper Marketing, RD Station e HubSpot, com análise de recursos, custos e recomendação para a BMX.',
    file:'docs/bmx_plan_202602_estudo-plataformas.pdf', date:'Fev/2026' },

  // ---- RELATÓRIOS · ANUAIS OU SEMESTRAIS ----
  { id:'semestral-s1-2026', cat:'semestral', iso:'2026-07',
    title:'Relatório de Marketing — 1º Semestre 2026',
    desc:'Fechamento semestral completo: mídia paga, redes sociais, CRM, e-mail marketing e evolução do funil no S1/2026.',
    file:'docs/bmx_report_2026-07_semestral-s1-2026.html', date:'Jul/2026' },

  // ---- RELATÓRIOS · TRIMESTRAIS ----
  { id:'performance-q1-2026', cat:'trimestral', iso:'2026-04',
    title:'Relatório de Marketing — 1º Trimestre 2026',
    desc:'Resultados consolidados de mídia paga, redes sociais, e-mail marketing e fatto bruto, com comentários e próximos passos.',
    file:'docs/bmx_report_202604_performance-q1-2026.pdf', date:'Abr/2026' },

  // ---- RELATÓRIOS · MENSAIS ----
  // (nenhum publicado no momento)

  // ---- STATUS SEMANAL ---- (nomenclatura AAAA-MM-DD; a lista ordena
  //      automaticamente pelo campo iso, do mais recente para o mais antigo)
  { id:'status-2026-07-08', cat:'status', iso:'2026-07-08',
    title:'Status de Marketing — 08/07/2026',
    desc:'Acompanhamento semanal: mídia paga, social media, CRM, ações e calendário editorial.',
    file:'docs/bmx_status_2026-07-08.html', date:'08/07/2026' },
  { id:'status-2026-06-30', cat:'status', iso:'2026-06-30',
    title:'Status de Marketing — 30/06/2026',
    desc:'Acompanhamento semanal: mídia paga, social media, CRM, ações e calendário editorial.',
    file:'docs/bmx_status_2026-06-30.html', date:'30/06/2026' },
  { id:'status-2026-06-25', cat:'status', iso:'2026-06-25',
    title:'Status de Marketing — 25/06/2026',
    desc:'Acompanhamento semanal: mídia paga, social media, CRM, ações e calendário editorial.',
    file:'docs/bmx_status_2026-06-25.html', date:'25/06/2026' },
  { id:'status-2026-06-17', cat:'status', iso:'2026-06-17',
    title:'Status de Marketing — 17/06/2026',
    desc:'Acompanhamento semanal: mídia paga, social media, CRM, ações e calendário editorial.',
    file:'docs/bmx_status_2026-06-17.html', date:'17/06/2026' },
];

const CAT_LABEL = {
  plan:'Planejamento',
  semestral:'Relatório Anual · Semestral',
  trimestral:'Relatório Trimestral',
  mensal:'Relatório Mensal',
  status:'Status Semanal',
};

/* ordenação: mais recente primeiro (campo iso AAAA-MM[-DD]) */
const byRecent = (a,b) => String(b.iso||'').localeCompare(String(a.iso||''));
const inCat = c => DOCS.filter(d=>d.cat===c).sort(byRecent);

/* ---- LINKS ÚTEIS (abrem em nova guia; não passam pelo viewer) ---- */
const LINKS = [
  { title:'Workflow 2026 — BMX Serviços',
    desc:'Planilha de workflow anual com frentes, entregas e responsáveis.',
    url:'https://docs.google.com/spreadsheets/d/1TfwhM1eBtiqlGf-usNqjVL-nc_K8lYNGgElJ9xrdVss/edit?usp=sharing' },
  { title:'Controle de Tarefas BMX',
    desc:'Acompanhamento das tarefas em andamento entre BMX e Braper.',
    url:'https://docs.google.com/spreadsheets/d/1fVq-8Ay2C5yIlgQRfTrD8iWHu3uRfF7JTVEbTXMX_7M/edit?usp=sharing' },
  { title:'Performance — TCI — BMX Serviços 2026',
    desc:'Planilha de dados de performance (TCI) que alimenta análises e relatórios.',
    url:'https://docs.google.com/spreadsheets/d/1kQ4c7sYLOoa4GKTLkz9kahNdeIZ3mXHGXTUEGQaOndg/edit?usp=sharing' },
];

/* ---- SUPORTE / GATE ---- */
const WA_NUMBER_GATE = '5511976353779';     // comercial do gate (Rafael)
const WA_NUMBER_SUPORTE = '5511995550735';  // suporte da Central
const WA_GATE = 'https://wa.me/' + WA_NUMBER_GATE + '?text=' + encodeURIComponent(
  'Olá! Vi na Central do Cliente BMX o Dashboard de Performance integrado (atualização automática e dados em tempo real) e quero saber mais sobre a contratação.');
const WA_SUPORTE = 'https://wa.me/' + WA_NUMBER_SUPORTE + '?text=' + encodeURIComponent(
  'Olá! Preciso de ajuda com a Central do Cliente BMX.');

/* ---- USUÁRIOS (validação client-side; barreira organizacional) ---- */
const USERS = {
  cliente: { pass:'bmx#2026#',   names:['JOAO','ZAIRA','VANESSA','MARCELO','FAUSTO','ANANDA'] },
  admin:   { pass:'braper#711#', names:['RAFAEL','GABRIEL'] },
};

/* =====================================================================
   SESSÃO — somente em memória (zero localStorage/sessionStorage)
   ===================================================================== */
let session = null;      // {name, group}
let originRoute = '#/home';

const $ = s => document.querySelector(s);
const norm = s => s.trim().toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ');

function cap(s){ return s.charAt(0) + s.slice(1).toLowerCase(); }

$('#loginForm').addEventListener('submit', e => {
  e.preventDefault();
  const name = norm($('#inName').value);
  const pass = $('#inPass').value;
  let group = null;
  if (USERS.cliente.names.includes(name) && pass === USERS.cliente.pass) group = 'cliente';
  else if (USERS.admin.names.includes(name) && pass === USERS.admin.pass) group = 'admin';
  if (!group){ $('#loginErr').classList.add('show'); $('#inPass').value=''; return; }
  $('#loginErr').classList.remove('show');
  session = { name: cap(name), group };
  $('#login').style.display = 'none';
  $('#shell').style.display = 'flex';
  $('#uName').textContent = session.name;
  $('#uAdmin').style.display = group === 'admin' ? '' : 'none';
  location.hash = '#/home';
  render();
});

$('#btnOut').addEventListener('click', () => {
  session = null;
  closeViewer();
  $('#shell').style.display = 'none';
  $('#login').style.display = 'flex';
  $('#loginForm').reset();
  location.hash = '';
});

/* =====================================================================
   ROTEADOR
   ===================================================================== */
window.addEventListener('hashchange', render);

function route(){
  const h = location.hash || '#/home';
  const m = h.match(/^#\/doc\/(.+)$/);
  if (m) return { r:'doc', id: decodeURIComponent(m[1]) };
  const r = h.replace('#/','') || 'home';
  return { r };
}

function render(){
  if (!session) return;
  const { r, id } = route();
  if (r === 'doc'){ openDoc(id); return; }
  closeViewer();
  const known = ['home','planejamento','relatorios','status','links','guia'];
  const cur = known.includes(r) ? r : 'home';
  document.querySelectorAll('nav.menu a').forEach(a => a.classList.toggle('active', a.dataset.r === cur));
  $('#view').innerHTML = PAGES[cur]();
  window.scrollTo(0,0);
}

/* =====================================================================
   VIEWER (iframe na mesma guia, com Voltar à origem + focus)
   ===================================================================== */
function findDoc(id){ return DOCS.find(d => d.id === id); }

function openDoc(id){
  const d = findDoc(id);
  if (!d){ location.hash = '#/home'; return; }
  const cameFrom = document.referrer; // não usado; origem controlada por originRoute
  $('#vCatTxt').textContent = CAT_LABEL[d.cat] || 'Documento';
  $('#vTitle').textContent = d.title;
  $('#vNew').href = d.file;
  $('#vFrame').src = d.file;
  $('#viewer').classList.add('open');
  document.body.style.overflow = 'hidden';
  $('#vFrame').addEventListener('load', () => { try{ $('#vFrame').focus(); }catch(e){} }, { once:true });
}

function closeViewer(){
  if (!$('#viewer').classList.contains('open')) return;
  $('#viewer').classList.remove('open');
  $('#vFrame').src = 'about:blank';
  document.body.style.overflow = '';
}

$('#vBack').addEventListener('click', () => {
  location.hash = originRoute;   // volta à lista de origem
});

/* memoriza a origem ao clicar em qualquer card de documento */
document.addEventListener('click', e => {
  const a = e.target.closest('a[data-doc]');
  if (a) originRoute = location.hash || '#/home';
});

/* =====================================================================
   PÁGINAS
   ===================================================================== */
function docCard(d){
  return `<a class="card" data-doc href="#/doc/${d.id}">
    <span class="cat"><span class="chev"><i></i><i></i></span> ${CAT_LABEL[d.cat]}</span>
    <h3>${d.title}</h3>
    <p>${d.desc}</p>
    <span class="meta"><span>${d.date}</span><span class="go">Abrir →</span></span>
  </a>`;
}

function emptyState(msg){
  return `<div class="empty"><span class="chev dim"><i></i><i></i></span><br>${msg}</div>`;
}

function gateCard(){
  return `<div class="card gate">
    <span class="soon">EM BREVE</span>
    <span class="cat"><span class="chev"><i></i><i></i></span> Performance</span>
    <h3>Dashboard de Performance Integrado</h3>
    <p>Um painel vivo da operação de marketing da BMX: integração direta com Google Ads, LinkedIn, Instagram e CRM, atualização automática, dados em tempo real e KPIs por canal, campanha e funil — sempre à mão, sem esperar o fechamento do mês.</p>
    <span class="avail">Recurso disponível sob contratação.</span>
    <a class="btn-wa" href="${WA_GATE}" target="_blank" rel="noopener">Quero saber mais · WhatsApp</a>
  </div>`;
}
